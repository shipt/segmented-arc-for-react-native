version: 2.1

defaults: &defaults
  working_directory: ~/segmented-arc-for-react-native
  docker:
    - image: cimg/node:24.13.1

orbs:
  node: circleci/node@7.2.1
commands:
  yarn_install:
    description: 'Install node and yarn packages'
    steps:
      - node/install-packages:
          cache-version: v2
          pkg-manager: yarn-berry
          include-branch-in-cache-key: false

jobs:
  test:
    <<: *defaults
    steps:
      - checkout
      - yarn_install
      - run:
          name: Run unit tests
          command: |
            yarn test:coverage
  deploy:
    <<: *defaults
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - 'SHA256:qOCt49Q9PD/ktHiVTmpyPL9NgpRhtLU+stAxjmScZ2U'
      - run:
          name: Create Git Version Tag
          command: "PACKAGE_VERSION=$(cat package.json | grep \\\"version\\\" | head -1 | awk -F: '{ print $2 }' | sed 's/[\",]//g' | tr -d '[[:space:]]') && git tag v$PACKAGE_VERSION && git push --tags"

workflows:
  version: 2.1
  run_test:
    jobs:
      - test
      - deploy:
          requires:
            - test
          filters:
            branches:
              only:
                - main
