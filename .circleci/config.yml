version: 2.1

defaults: &defaults
  working_directory: ~/segmented-arc-for-react-native
  docker:
    - image: cimg/node:24.13.1

yarn_install: &yarn_install
  description: 'Install node and yarn packages'
  steps:
    - run:
        name: 'Install and Configure Yarn'
        command: |
          corepack enable
          yarn config set enableGlobalCache false
          yarn config set enableScripts false
    - node/install-packages:
        cache-version: v2
        pkg-manager: yarn-berry
        include-branch-in-cache-key: false
    - install:
        name: Install yarn
        command: yarn install --immutable

jobs:
  test:
    <<: *defaults
    steps:
      - checkout
      - restore_cache:
          name: Restore Yarn Package Cache
          keys:
            - yarn-v1-unit-tests-{{ arch }}-{{ checksum "yarn.lock" }}-{{ .Branch }}
            - yarn-v1-unit-tests-{{ arch }}-{{ checksum "yarn.lock" }}-
      - <<: *yarn_install
      - save_cache:
          name: Save Yarn Package Cache
          key: yarn-v1-unit-tests-{{ arch }}-{{ checksum "yarn.lock" }}-{{ .Branch }}
          paths:
            - node_modules/
      - run:
          name: Run unit tests
          command: |
            yarn test:coverage
  deploy:
    <<: *defaults
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - 'SHA256:qOCt49Q9PD/ktHiVTmpyPL9NgpRhtLU+stAxjmScZ2U'
      - run:
          name: Create Git Version Tag
          command: "PACKAGE_VERSION=$(cat package.json | grep \\\"version\\\" | head -1 | awk -F: '{ print $2 }' | sed 's/[\",]//g' | tr -d '[[:space:]]') && git tag v$PACKAGE_VERSION && git push --tags"

workflows:
  version: 2.1
  -run_test:
    jobs:
      - test
      - deploy:
          requires:
            - test
          filters:
            branches:
              only:
                - main
